apiVersion: apps/v1
kind: Deployment
metadata:
  name: kyaubry-app
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kyaubry-app
  template:
    metadata:
      labels:
        app: kyaubry-app
    spec:
      containers:
      - name: kyaubry42
        image: pouletenfuite/red-tetris:v1
        ports:
        - containerPort: 8888
